# ── Gzip compression ─────────────────────────────────────────────────────────
gzip              on;
gzip_comp_level   5;
gzip_min_length   256;
gzip_proxied      any;
gzip_vary         on;
gzip_types
    text/plain text/css text/javascript application/javascript
    application/json application/x-javascript text/xml application/xml
    application/xml+rss image/svg+xml font/woff2;

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name YOUR_DOMAIN;
    return 301 https://$host$request_uri;
}

# ── Main HTTPS block ──────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name YOUR_DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Performance: efficient file serving
    sendfile    on;
    tcp_nopush  on;
    tcp_nodelay on;

    # Keep connections alive — avoids TCP handshake cost per request
    keepalive_timeout 65;

    # ── Static assets: aggressive caching ───────────────────────────────────
    location ~* \.(css|js|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        proxy_pass         http://127.0.0.1:YOUR_APP_PORT;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Tell browsers to cache for 7 days
        add_header Cache-Control "public, max-age=604800, immutable";
        add_header Vary Accept-Encoding;
        expires 7d;
    }

    # ── HTML pages: always revalidate ────────────────────────────────────────
    location ~* \.html$ {
        proxy_pass         http://127.0.0.1:YOUR_APP_PORT;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    # ── API: no caching ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:YOUR_APP_PORT;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "no-store";
    }

    # ── Default ───────────────────────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:YOUR_APP_PORT;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        'upgrade';
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    access_log /var/log/nginx/YOUR_DOMAIN.access.log;
    error_log  /var/log/nginx/YOUR_DOMAIN.error.log;
}
