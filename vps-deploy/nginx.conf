server {
    listen 80;
    server_name truthxplatfom.courtneytech.xyz;

    # ── IMPORTANT ────────────────────────────────────────────────────────────
    # Replace YOUR_PTERODACTYL_PORT below with the port shown in your
    # Pterodactyl panel under Server → Address (e.g. 4057, 25565, etc.)
    # Run: sed -i 's/YOUR_PTERODACTYL_PORT/4057/g' /etc/nginx/sites-available/truthxplatfom.courtneytech.xyz
    # Then: nginx -t && systemctl reload nginx
    # ─────────────────────────────────────────────────────────────────────────

    location / {
        proxy_pass http://localhost:YOUR_PTERODACTYL_PORT;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
